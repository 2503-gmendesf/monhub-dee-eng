<!-- ======================= APP SHELL ======================= -->
<div id="app" style="display:none">

<style>
/* =====================================================================
   VARIÁVEIS E RESET
===================================================================== */
:root{
  --azul-escuro:#0D2B5E;
  --azul-medio:#185FA5;
  --azul-vivo:#2563EB;
  --azul-claro:#EAF1FA;
  --verde-ok:#15803D;
  --vermelho-off:#DC2626;
  --amarelo-warn:#D97706;
  --cinza-texto:#374151;
  --cinza-suave:#9CA3AF;
  --fundo:#F8FAFC;
  --branco:#FFFFFF;
  --sidebar-w:240px;
}
*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--fundo);
  color:var(--cinza-texto);

}
h1,h2,h3,h4{ margin:0 0 8px; color:#1a1f36; }
p{ margin:0 0 8px; }
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; }
a{ color:var(--azul-medio); }
.sr-only{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}
:focus-visible{ outline:2px solid var(--azul-vivo); outline-offset:2px; }
code, .mono{ font-family:'JetBrains Mono',monospace; }

/* =====================================================================
   LOGIN
===================================================================== */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg,#0D2B5E 0%,#122a52 45%,#0b1e3f 100%);

}
.login-card{
  background:var(--branco); border-radius:16px; padding:40px 32px;

}
.login-logo{ display:flex; justify-content:center; margin-bottom:20px; }

.login-hint{ font-size:13px; color:var(--cinza-suave); margin-bottom:24px; }
.login-roles{ display:flex; flex-direction:column; gap:14px; text-align:left; }
.login-role-block{ display:flex; gap:8px; }

.role-btn{

}

/* =====================================================================

===================================================================== */
#app{ min-height:100vh; }

   SIDEBAR
===================================================================== */

}

/* =====================================================================
   MOBILE HEADER / BOTTOM NAV
===================================================================== */
.mobile-header{

  padding:12px 16px; position:sticky; top:0; z-index:30;
}

.mobile-header .mh-page{ font-size:14px; font-weight:600; margin-left:auto; color:#C9D6E8; }

   COMPONENTES
===================================================================== */
.card{

}
.grid-2{ display:grid; grid-template-columns:1fr; gap:18px; }
.grid-3{ display:grid; grid-template-columns:1fr; gap:16px; }

.section-title{ display:flex; align-items:center; justify-content:space-between; margin:28px 0 12px; }

.btn-danger{ background:#FEE2E2; color:var(--vermelho-off); }
.btn-danger:hover{ background:#fecaca; }
.btn-ghost{ background:none; color:var(--cinza-texto); border:1px solid #E2E8F0; }
.btn-ghost:hover{ background:#F1F5F9; }
.btn-sm{ padding:6px 12px; font-size:12px; }
.btn:disabled{ opacity:0.5; cursor:not-allowed; }
.btn svg{ width:15px; height:15px; }

.badge{
  display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:20px;
  font-size:12px; font-weight:600; white-space:nowrap;
}
.avatar{ display:flex; align-items:center; justify-content:center; border-radius:50%; color:#fff; font-weight:700; flex-shrink:0; }

.form-group{ margin-bottom:14px; }
.form-group label{ display:block; font-size:13px; font-weight:600; margin-bottom:5px; color:#1a1f36; }
.form-hint{ font-size:11px; color:var(--cinza-suave); margin-top:3px; }
.input,.select,.textarea{
  width:100%; padding:10px 12px; border-radius:8px; border:1px solid #E2E8F0; font-size:14px;

}
.input:focus,.select:focus,.textarea:focus{ border-color:var(--azul-vivo); }
.textarea{ resize:vertical; min-height:90px; }
.char-count{ font-size:11px; color:var(--cinza-suave); text-align:right; margin-top:2px; }
.day-toggle-group{ display:flex; gap:6px; flex-wrap:wrap; }
.day-toggle{

.radio-group{ display:flex; gap:14px; flex-wrap:wrap; }

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,23,42,0.55); display:flex; align-items:center;
  justify-content:center; z-index:100; padding:20px; animation:fadeIn 200ms ease;
}
.modal{
  background:#fff; border-radius:14px; max-width:520px; width:100%; max-height:88vh; overflow-y:auto;
  animation:slideUp 200ms ease; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-header{
  display:flex; align-items:center; justify-content:space-between; padding:18px 22px;
  border-bottom:1px solid #EEF2F7; position:sticky; top:0; background:#fff; z-index:2;
}

.modal-close{ background:none; border:none; color:var(--cinza-suave); font-size:20px; line-height:1; padding:4px; border-radius:6px; }

.modal-body{ padding:20px 22px; }
.modal-footer{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid #EEF2F7; }

@keyframes slideUp{ from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:translateY(0)} }

/* Toast */
#toast-root{ position:fixed; top:16px; right:16px; z-index:200; display:flex; flex-direction:column; gap:10px; max-width:340px; }
.toast{
  background:#1a1f36; color:#fff; padding:12px 16px; border-radius:10px; font-size:13px; font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.25); display:flex; align-items:center; gap:8px;
  animation:toastIn 200ms ease;
}
.toast.success{ background:#14532D; }
.toast.error{ background:#7F1D1D; }
.toast.warning{ background:#78350F; }
.toast.info{ background:#1E3A5F; }
@keyframes toastIn{ from{opacity:0; transform:translateX(30px)} to{opacity:1; transform:translateX(0)} }
.toast.out{ animation:toastOut 200ms ease forwards; }

.search-bar{ position:relative; margin-bottom:14px; }
.search-bar svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--cinza-suave); }
.search-bar input{ padding-left:40px; font-size:15px; padding-top:12px; padding-bottom:12px; }

.map-embed iframe{ width:100%; height:340px; border:0; display:block; }

.collapsible-header{ display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:600; font-size:14px; color:var(--azul-medio); background:none; border:none; padding:8px 0; }

.disc-preview-card{ background:#fff; border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }

/* =====================================================================
   ANIMAÇÕES
===================================================================== */
.fade-in{ animation:fadeIn 250ms ease; }

<script>
/* =====================================================================
   SEED DE DADOS
===================================================================== */
const DB_KEY = 'monhub_db';

function pad2(n){ return String(n).padStart(2,'0'); }
function toISODate(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function proximaOcorrenciaDate(diaSemana, from){
  const base = from ? new Date(from) : new Date();
  base.setHours(0,0,0,0);
  const diff = (diaSemana - base.getDay() + 7) % 7;
  return addDays(base, diff);
}

function $(sel,root){ return (root||document).querySelector(sel); }

function esc(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDateBR(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');

}

function agendamentosAtivosDoHorario(horarioId, data){
  const db = getDB();
  return db.agendamentos.filter(a=> a.horarioId===horarioId && (!data || a.data===data) && ['confirmado','pendente'].includes(a.status));
}
function vagasRestantes(horario){
  const data = toISODate(proximaOcorrenciaDate(horario.diaSemana));
  const ocupadas = agendamentosAtivosDoHorario(horario.id, data).length;
  return Math.max(0, horario.vagasTotal - ocupadas);
}
function isDisponivelAgora(horario){
  const agora = new Date();
  if(horario.diaSemana !== agora.getDay()) return false;
  const minutosAgora = agora.getHours()*60 + agora.getMinutes();
  const [hi,mi] = horario.horaInicio.split(':').map(Number);
  const [hf,mf] = horario.horaFim.split(':').map(Number);
  return minutosAgora >= (hi*60+mi) && minutosAgora <= (hf*60+mf);
}
function proximaAtivaOuEm2h(horarios){
  const agora = new Date();
  for(const h of horarios){
    if(isDisponivelAgora(h)) return {horario:h, status:'ativa'};
    if(h.diaSemana === agora.getDay()){
      const [hi,mi] = h.horaInicio.split(':').map(Number);
      const inicioMin = hi*60+mi;
      const agoraMin = agora.getHours()*60+agora.getMinutes();
      if(inicioMin > agoraMin && (inicioMin-agoraMin) <= 120) return {horario:h, status:'em-breve'};
    }
  }
  return null;
}

/* Toasts */
function toast(msg, type){
  type = type || 'success';
  const icons = { success:'check-circle', error:'x-circle', warning:'alert-triangle', info:'info' };
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = '<i data-lucide="'+(icons[type]||'info')+'" style="width:16px;height:16px;flex-shrink:0"></i><span>'+esc(msg)+'</span>';
  document.getElementById('toast-root').appendChild(el);
  lucide.createIcons();
  setTimeout(()=>{
    el.classList.add('out');
    setTimeout(()=>el.remove(),220);
  }, 4000);
}

/* Modal */
let __modalKeyHandler = null;
function openModal(innerHtml){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'active-modal-overlay';
  overlay.innerHTML = '<div class="modal" role="dialog" aria-modal="true">'+innerHtml+'</div>';
  overlay.addEventListener('mousedown', (e)=>{ if(e.target === overlay) closeModal(); });
  document.getElementById('modal-root').appendChild(overlay);
  lucide.createIcons();
  __modalKeyHandler = (e)=>{ if(e.key==='Escape') closeModal(); };
  document.addEventListener('keydown', __modalKeyHandler);
  const focusable = overlay.querySelector('input,select,textarea,button');
  if(focusable) focusable.focus();
}
function closeModal(){
  const overlay = document.getElementById('active-modal-overlay');
  if(overlay) overlay.remove();
  if(__modalKeyHandler){ document.removeEventListener('keydown', __modalKeyHandler); __modalKeyHandler=null; }
}
window.closeModal = closeModal;

function monitoriaStatus(monitoria){
  const db = getDB();
  const horarios = db.horarios.filter(h=>h.monitoriaId===monitoria.id && h.ativo);
  const hasPresencialVaga = horarios.some(h=> ['presencial','hibrido'].includes(h.formato) && vagasRestantes(h)>0 );
  const hasRemotoVaga = horarios.some(h=> ['remoto','hibrido'].includes(h.formato) && vagasRestantes(h)>0 );
  if(hasPresencialVaga) return 'disponivel';
  if(hasRemotoVaga) return 'remoto';
  return 'ocupado';
}

      else actionBtn = '<button class="btn btn-primary btn-sm" onclick="openAgendarConfirm('+h.id+')">Agendar</button>';
    }
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1F5F9">'+

function openAgendarConfirm(horarioId){

  const monitoria = getMonitoria(h.monitoriaId);
  const disc = getDisciplina(monitoria.disciplinaId);
  const monitor = getUser(monitoria.monitorId);
  const data = toISODate(proximaOcorrenciaDate(h.diaSemana));
  const local = h.formato==='remoto' ? 'Remoto ('+ (h.linkRemoto||'link enviado por e-mail') +')' : getLabDesc(h.labId)+' (Presencial)';

  openModal(
    '<div class="modal-header"><h3>Agendar Monitoria</h3><button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button></div>'+
    '<div class="modal-body">'+
      '<p>📚 '+esc(disc.nome)+'</p>'+
      '<p>👤 '+esc(monitor.nome)+'</p>'+
      '<p>📅 '+WEEKDAYS[h.diaSemana]+', '+fmtDateBR(data)+'</p>'+
      '<p>🕐 '+h.horaInicio+' – '+h.horaFim+'</p>'+
      '<p>📍 '+esc(local)+'</p>'+

      '<textarea id="msg-agendamento" class="textarea" placeholder="Ex: Dúvida na lista 3, exercício 5"></textarea></div>'+
    '</div>'+
    '<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn btn-primary" onclick="confirmarAgendamento('+horarioId+',\''+data+'\')">Confirmar agend.</button></div>'
  );
}

function confirmarAgendamento(horarioId, data){
  const u = getCurrentUser();
  const db = getDB();
  const h = getHorario(horarioId);

  const conflito = db.agendamentos.some(a=> a.alunoId===u.id && a.data===data && ['confirmado','pendente'].includes(a.status) && getHorario(a.horarioId).horaInicio===h.horaInicio);
  if(conflito){
    openModal(
      '<div class="modal-header"><h3>Conflito de horário</h3><button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button></div>'+
      '<div class="modal-body"><p>Você já tem um agendamento neste horário.</p></div>'+
      '<div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Entendi</button></div>'
    );
    return;
  }
  if(vagasRestantes(h) <= 0){ toast('Sem vagas disponíveis para este horário.','error'); closeModal(); return; }

  const msg = ($('#msg-agendamento') && $('#msg-agendamento').value.trim()) || '';
  const novo = { id:nextId(db.agendamentos), horarioId, alunoId:u.id, data, mensagem:msg, status:'confirmado' };
  db.agendamentos.push(novo);
  setDB(db);
  closeModal();
  const monitor = getUser(getMonitoria(h.monitoriaId).monitorId);
  const diaCurto = WEEKDAYS[h.diaSemana].toLowerCase();
  toast('✓ Agendamento confirmado! '+monitor.nome+' te espera '+diaCurto+' às '+h.horaInicio+'.','success');
  router.render(currentPath());
}

      '</select>'+
      '<select class="select" id="busca-formato" aria-label="Filtrar por formato">'+

      '</select>'+

    '</div>'+
    '<div id="busca-results" class="grid-2"></div>'
  );
}

function renderBuscaResults(){
  const db = getDB();
  const t = buscaState.termo.toLowerCase();
  const results = db.monitorias.filter(m=>{
    const disc = getDisciplina(m.disciplinaId);
    const monitor = getUser(m.monitorId);
    if(buscaState.depto!=='todos' && disc.depto!==buscaState.depto) return false;
    const horarios = db.horarios.filter(h=>h.monitoriaId===m.id && h.ativo);
    if(buscaState.formato!=='todos' && !horarios.some(h=>h.formato===buscaState.formato || h.formato==='hibrido')) return false;
    if(buscaState.agora && !horarios.some(isDisponivelAgora)) return false;
    if(t && !(disc.nome.toLowerCase().includes(t) || disc.codigo.toLowerCase().includes(t) || monitor.nome.toLowerCase().includes(t))) return false;
    return true;
  });
  const el = document.getElementById('busca-results');
  if(!el) return;
  el.innerHTML = results.length
    ? results.map(monitoriaCardHTML).join('')
    : '<div class="empty-state" style="grid-column:1/-1"><i data-lucide="search-x"></i><p>Nenhuma monitoria encontrada.</p></div>';
  lucide.createIcons();
}

function afterRenderBusca(){
  renderBuscaResults();
  $('#busca-input').addEventListener('input', e=>{ buscaState.termo = e.target.value; renderBuscaResults(); });
  $('#busca-depto').addEventListener('change', e=>{ buscaState.depto = e.target.value; renderBuscaResults(); });
  $('#busca-formato').addEventListener('change', e=>{ buscaState.formato = e.target.value; renderBuscaResults(); });
  $('#busca-agora').addEventListener('change', e=>{ buscaState.agora = e.target.checked; renderBuscaResults(); });
}

let calendarInstance = null;
let calendarioFiltroDisc = 'todos';

function pageCalendario(){

      '</select>'+

      db.disciplinas.map(d=>'<span><span class="legend-dot" style="background:'+discColor(d.id)+'"></span>'+d.nome+'</span>').join('')+
    '</div>'+
    '<div class="card"><div id="fc-calendar"></div></div>'
  );

function buildCalendarEvents(){
  const db = getDB();
  const events = [];
  db.horarios.filter(h=>h.ativo).forEach(h=>{
    const monitoria = getMonitoria(h.monitoriaId);
    if(!monitoria) return;
    if(calendarioFiltroDisc!=='todos' && String(monitoria.disciplinaId)!==String(calendarioFiltroDisc)) return;
    const disc = getDisciplina(monitoria.disciplinaId);
    const icone = h.formato==='remoto' ? '💻 ' : '📍 ';
    events.push({
      title: icone + disc.nome,
      daysOfWeek: [h.diaSemana],
      startTime: h.horaInicio,
      endTime: h.horaFim,
      startRecur: '2024-01-01',
      color: discColor(monitoria.disciplinaId),
      extendedProps: { horarioId: h.id, monitoriaId: monitoria.id }
    });
  });
  return events;
}

function afterRenderCalendario(){
  $('#cal-disc-filter').addEventListener('change', e=>{
    calendarioFiltroDisc = e.target.value;
    if(calendarInstance){ calendarInstance.removeAllEventSources(); calendarInstance.addEventSource(buildCalendarEvents()); }
  });
  const el = document.getElementById('fc-calendar');
  if(calendarInstance){ calendarInstance.destroy(); }
  calendarInstance = new FullCalendar.Calendar(el, {
    initialView: 'timeGridWeek',
    headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay,listWeek' },
    locale:'pt-br',
    height:'auto',
    slotMinTime:'07:00:00',
    slotMaxTime:'20:00:00',
    events: buildCalendarEvents(),
    eventClick: (info)=>{ openEventoModal(info.event.extendedProps.horarioId); }
  });
  calendarInstance.render();
}

function openEventoModal(horarioId){
  const h = getHorario(horarioId);
  const monitoria = getMonitoria(h.monitoriaId);
  const disc = getDisciplina(monitoria.disciplinaId);
  const monitor = getUser(monitoria.monitorId);

  const local = h.formato==='remoto' ? 'Remoto' : getLabDesc(h.labId);
  const canAgendar = can('aluno') && getCurrentUser().role==='aluno' && vagas>0;
  openModal(

function exportarICS(horarioId){
  const h = getHorario(horarioId);
  const monitoria = getMonitoria(h.monitoriaId);
  const diasSemana = ['SU','MO','TU','WE','TH','FR','SA'];
  const byDay = diasSemana[h.diaSemana];
  const dataInicio = proximaOcorrenciaDate(h.diaSemana);
  const dtStr = toISODate(dataInicio).replace(/-/g,'');
  const ics = 'BEGIN:VCALENDAR\r\n'+
    'VERSION:2.0\r\n'+
    'PRODID:-//MonHub DEE UFMG//PT\r\n'+
    'BEGIN:VEVENT\r\n'+
    'SUMMARY:Monitoria - '+getNomeDisc(monitoria.disciplinaId)+'\r\n'+
    'DESCRIPTION:Monitor: '+getNomeUser(monitoria.monitorId)+'\r\n'+
    'LOCATION:'+getLabDesc(h.labId)+'\r\n'+
    'RRULE:FREQ=WEEKLY;BYDAY='+byDay+'\r\n'+
    'DTSTART:'+dtStr+'T'+h.horaInicio.replace(':','')+'00\r\n'+
    'DTEND:'+dtStr+'T'+h.horaFim.replace(':','')+'00\r\n'+
    'END:VEVENT\r\n'+
    'END:VCALENDAR';
  const blob = new Blob([ics], { type:'text/calendar' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'monitoria-'+getNomeDisc(monitoria.disciplinaId).replace(/\s+/g,'-').toLowerCase()+'.ics';
  document.body.appendChild(link);
  link.click();
  link.remove();
  toast('Arquivo .ics baixado com sucesso.','success');
}

function pageMeusHorarios(){
  const u = getCurrentUser();
  const db = getDB();
  const minhasMonitorias = db.monitorias.filter(m=>m.monitorId===u.id);
  const meusHorarios = db.horarios.filter(h=> minhasMonitorias.some(m=>m.id===h.monitoriaId));
  const meusAgendamentos = db.agendamentos.filter(a=>{
    const h = getHorario(a.horarioId);
    return h && meusHorarios.some(mh=>mh.id===h.id);
  }).sort((a,b)=> a.data.localeCompare(b.data));

  const alunoIndex = {};
  let counter = 1;

  const agendaHTML = meusAgendamentos.length ? (
    '<div class="table-wrap"><table class="data-table"><thead><tr><th>Aluno</th><th>Disciplina</th><th>Data</th><th>Hora</th><th>Mensagem</th><th>Status</th><th>Ação</th></tr></thead><tbody>'+
    meusAgendamentos.map(a=>{
      const h = getHorario(a.horarioId);
      const monitoria = getMonitoria(h.monitoriaId);
      const disc = getDisciplina(monitoria.disciplinaId);
      if(!alunoIndex[a.alunoId]) alunoIndex[a.alunoId] = counter++;
      const acao = a.status==='confirmado'
        ? '<button class="btn btn-secondary btn-sm" onclick="marcarConcluido('+a.id+')">Marcar concluído</button>'
        : '—';
      return '<tr><td>Aluno #'+alunoIndex[a.alunoId]+'</td><td>'+esc(disc.nome)+'</td><td>'+fmtDateBR(a.data)+'</td><td>'+h.horaInicio+'</td>'+
        '<td title="'+esc(a.mensagem)+'" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.mensagem||'—')+'</td>'+
        '<td>'+Badge(a.status)+'</td><td>'+acao+'</td></tr>';
    }).join('') + '</tbody></table></div>'
  ) : '<div class="empty-state"><i data-lucide="inbox"></i><p>Nenhum agendamento recebido ainda.</p></div>';

  const horariosHTML = meusHorarios.length ? meusHorarios.map(h=>{
    const monitoria = getMonitoria(h.monitoriaId);
    const disc = getDisciplina(monitoria.disciplinaId);
    return '<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
      '<div><strong>'+esc(disc.nome)+'</strong><br><span style="font-size:13px;color:var(--cinza-suave)">'+WEEKDAYS[h.diaSemana]+' · '+h.horaInicio+'–'+h.horaFim+' · '+(h.formato==='remoto'?'Remoto':getLabDesc(h.labId))+'</span>'+(!h.ativo?'  '+Badge('inativo'):'')+'</div>'+
      '<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="openHorarioModal('+h.id+')">Editar</button>'+
      '<button class="btn btn-danger btn-sm" onclick="toggleHorarioAtivo('+h.id+')">'+(h.ativo?'Desativar':'Ativar')+'</button></div>'+
    '</div>';
  }).join('') : '<div class="empty-state"><i data-lucide="clock"></i><p>Você ainda não cadastrou horários.</p></div>';

  return (
    '<div class="section-title"><h2>Minha Agenda de Agendamentos</h2></div>'+agendaHTML+
    '<div class="section-title"><h2>Gerenciar Meus Horários</h2><button class="btn btn-primary btn-sm" onclick="openHorarioModal()"><i data-lucide="plus"></i> Adicionar Horário</button></div>'+
    horariosHTML
  );

function salvarHorario(horarioId){
  const u = getCurrentUser();
  const db = getDB();
  const discId = Number($('#h-disc').value);
  const diaBtn = $('#h-dias .day-toggle.active');
  if(!diaBtn){ $('#h-erro').style.display='block'; $('#h-erro').textContent='Selecione o dia da semana.'; return; }
  const dia = Number(diaBtn.dataset.dia);
  const horaInicio = $('#h-inicio').value;
  const horaFim = $('#h-fim').value;
  const formato = $('input[name="h-formato"]:checked').value;
  const labId = (formato==='presencial'||formato==='hibrido') ? Number($('#h-lab').value) : null;
  const linkRemoto = $('#h-linkremoto').value.trim();
  const vagasTotal = Number($('#h-vagas').value) || 1;

  const conflito = db.horarios.some(h2=>{
    if(h2.id===horarioId) return false;
    const monitoria = getMonitoria(h2.monitoriaId);
    if(monitoria.monitorId !== u.id) return false;
    if(h2.diaSemana !== dia) return false;
    return (horaInicio < h2.horaFim) && (horaFim > h2.horaInicio);
  });
  if(conflito){
    $('#h-erro').style.display='block';
    $('#h-erro').textContent='Você já tem horário cadastrado neste dia e hora.';
    return;
  }

  let monitoria = db.monitorias.find(m=>m.monitorId===u.id && m.disciplinaId===discId);
  if(!monitoria){
    monitoria = { id:nextId(db.monitorias), monitorId:u.id, disciplinaId:discId, professorId:db.users.find(x=>x.role==='professor').id, semestre:'2025-1' };
    db.monitorias.push(monitoria);
  }

  if(horarioId){
    const h = db.horarios.find(x=>x.id===horarioId);
    Object.assign(h, { monitoriaId:monitoria.id, diaSemana:dia, horaInicio, horaFim, formato, labId, linkRemoto, vagasTotal });
  } else {
    db.horarios.push({ id:nextId(db.horarios), monitoriaId:monitoria.id, diaSemana:dia, horaInicio, horaFim, formato, labId, linkRemoto, vagasTotal, ativo:true });
  }
  setDB(db);
  closeModal();
  toast('Horário salvo com sucesso.','success');
  router.render(currentPath());
}

function pageAdmin(){
  const db = getDB();
  const monitoriasAtivas = db.monitorias.length;
  const discsComMonitoria = new Set(db.monitorias.map(m=>m.disciplinaId)).size;
  const inicioSemana = addDays(new Date(), -new Date().getDay()+1);
  const fimSemana = addDays(inicioSemana, 6);
  const agsSemana = db.agendamentos.filter(a=> a.status!=='cancelado' && a.data>=toISODate(inicioSemana) && a.data<=toISODate(fimSemana)).length;
  const pendentes = db.informativos.filter(i=>i.status==='pendente').length;

  const contagemDias = [0,0,0,0,0];
  db.agendamentos.forEach(a=>{
    const dow = new Date(a.data+'T00:00:00').getDay();
    if(dow>=1 && dow<=5) contagemDias[dow-1]++;
  });
  const maxVal = Math.max(1, ...contagemDias);
  const barW = 60, gap = 30, chartH = 160;
  const bars = contagemDias.map((v,idx)=>{
    const h = (v/maxVal) * (chartH-30);
    const x = idx*(barW+gap) + 20;
    return '<rect x="'+x+'" y="'+(chartH-h)+'" width="'+barW+'" height="'+h+'" fill="#185FA5" rx="4"></rect>'+
      '<text x="'+(x+barW/2)+'" y="'+(chartH-h-8)+'" text-anchor="middle" font-size="12" fill="#374151">'+v+'</text>'+
      '<text x="'+(x+barW/2)+'" y="'+(chartH+18)+'" text-anchor="middle" font-size="12" fill="#9CA3AF">'+WEEKDAYS_SHORT[idx+1]+'</text>';
  }).join('');
  const svgChart = '<svg viewBox="0 0 '+(5*(barW+gap)+20)+' '+(chartH+30)+'" style="width:100%;max-width:520px;height:auto">'+bars+'</svg>';

  const monitorRows = db.users.filter(u=>u.role==='monitor').map(m=>{
    const minhasMonitorias = db.monitorias.filter(mo=>mo.monitorId===m.id);
    const discNomes = minhasMonitorias.map(mo=>getNomeDisc(mo.disciplinaId)).join(', ');
    const horariosAtivos = db.horarios.filter(h=> minhasMonitorias.some(mo=>mo.id===h.monitoriaId) && h.ativo).length;
    const agsCount = db.agendamentos.filter(a=>{ const h=getHorario(a.horarioId); return h && minhasMonitorias.some(mo=>mo.id===h.monitoriaId); }).length;
    return '<tr><td>'+esc(m.nome)+'</td><td>'+esc(discNomes)+'</td><td>'+horariosAtivos+'</td><td>'+agsCount+'</td><td>'+Badge(m.ativo?'ativo':'inativo')+'</td>'+
      '<td style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="verPerfilMonitor('+m.id+')">Ver perfil</button>'+
      '<button class="btn btn-danger btn-sm" onclick="toggleUserAtivo('+m.id+')">'+(m.ativo?'Desativar':'Ativar')+'</button></td></tr>';
  }).join('');

  const monitoriasRows = db.monitorias.map(mo=>{
    const disc = getDisciplina(mo.disciplinaId);
    return '<tr><td>'+disc.depto+'</td><td>'+esc(disc.nome)+'</td><td>'+getNomeUser(mo.monitorId)+'</td><td>'+getNomeUser(mo.professorId)+'</td><td>'+mo.semestre+'</td></tr>';
  }).join('');

  return (
    '<div class="grid-4">'+
      '<div class="metric-card"><div class="metric-value">'+monitoriasAtivas+'</div><div class="metric-label">Monitorias Ativas</div></div>'+
      '<div class="metric-card"><div class="metric-value">'+discsComMonitoria+'</div><div class="metric-label">Disciplinas com Monitoria</div></div>'+
      '<div class="metric-card"><div class="metric-value">'+agsSemana+'</div><div class="metric-label">Agendamentos Esta Semana</div></div>'+
      '<div class="metric-card"><div class="metric-value">'+pendentes+'</div><div class="metric-label">Pendentes Aprovação</div></div>'+
    '</div>'+
    '<div class="section-title"><h2>Agendamentos por Dia</h2></div>'+
    '<div class="card">'+svgChart+'</div>'+
    '<div class="section-title"><h2>Gerenciar Monitores</h2><button class="btn btn-primary btn-sm" onclick="openPromoverModal()"><i data-lucide="user-plus"></i> Promover Aluno a Monitor</button></div>'+
    '<div class="card table-wrap"><table class="data-table"><thead><tr><th>Nome</th><th>Disciplina</th><th>Horários ativos</th><th>Agendamentos</th><th>Status</th><th>Ações</th></tr></thead><tbody>'+monitorRows+'</tbody></table></div>'+
    '<div class="section-title"><h2>Todas as Monitorias</h2></div>'+
    '<div class="card table-wrap"><table class="data-table"><thead><tr><th>Depto</th><th>Disciplina</th><th>Monitor</th><th>Professor</th><th>Semestre</th></tr></thead><tbody>'+monitoriasRows+'</tbody></table></div>'
  );
}

    return '<div class="card" style="margin-bottom:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center"><strong>'+esc(disc.nome)+'</strong><span class="badge" style="background:#F3F4F6;color:#6B7280">Anônima</span></div>'+
      '<p style="font-size:12px;color:var(--cinza-suave)">'+getNomeUser(monitoria.monitorId)+' · '+fmtDateBR(a.data)+'</p>'+
      '<div class="stars" id="stars-'+a.id+'" data-value="0">'+[1,2,3,4,5].map(n=>'<button type="button" class="star-btn" onclick="setStar('+a.id+','+n+')">★</button>').join('')+'</div>'+
      '<textarea class="textarea" id="coment-'+a.id+'" placeholder="Comentário (opcional)" style="margin-top:8px"></textarea>'+
      '<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="enviarAvaliacao('+a.id+')">Enviar avaliação</button>'+
    '</div>';
  }).join('') : '<p class="form-hint">Nenhuma monitoria concluída aguardando avaliação.</p>';

  return (
    '<div class="section-title"><h2>Próximos agendamentos</h2></div>'+proximosHTML+
    '<div class="section-title"><h2>Avaliar monitorias concluídas</h2></div>'+avaliarHTML
  );
}

function setStar(agendamentoId, n){
  const container = $('#stars-'+agendamentoId);
  container.dataset.value = n;
  $all('.star-btn', container).forEach((btn,idx)=> btn.classList.toggle('filled', idx<n));
}

function enviarAvaliacao(agendamentoId){
  const container = $('#stars-'+agendamentoId);
  const nota = Number(container.dataset.value);
  if(!nota){ toast('Selecione uma nota de 1 a 5 estrelas.','error'); return; }
  const comentario = $('#coment-'+agendamentoId).value.trim();
  const db = getDB();
  db.avaliacoes.push({ id:nextId(db.avaliacoes), agendamentoId, nota, comentario, anonima:true });
  setDB(db);
  toast('Avaliação enviada. Obrigado!','success');
  router.render(currentPath());
}

function abrirCancelarAgendamento(id){
  openModal(
    '<div class="modal-header"><h3>Cancelar agendamento</h3><button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button></div>'+
    '<div class="modal-body"><p>Tem certeza? O monitor será notificado.</p></div>'+
    '<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Voltar</button><button class="btn btn-danger" onclick="confirmarCancelamento('+id+')">Confirmar cancelamento</button></div>'
  );
}
function confirmarCancelamento(id){
  const db = getDB();
  const a = db.agendamentos.find(x=>x.id===id);
  a.status = 'cancelado';
  setDB(db);
  closeModal();
  toast('Agendamento cancelado.','warning');
  router.render(currentPath());
}

/* =====================================================================
   PÁGINA: DASHBOARD
===================================================================== */
function pageDashboard(){
  const u = getCurrentUser();
  if(u.role==='aluno') return dashboardAluno(u);
  if(u.role==='monitor') return dashboardMonitor(u);
  if(u.role==='professor') return dashboardProfessor(u);
  return dashboardAdmin(u);
}

function proximosHorariosGeral(limit){
  const db = getDB();
  const agora = new Date();
  const items = db.horarios.filter(h=>h.ativo).map(h=>{
    let diasAte = (h.diaSemana - agora.getDay() + 7) % 7;
    return { h, diasAte };
  }).sort((a,b)=>a.diasAte-b.diasAte).slice(0, limit||3);
  return items.map(({h})=>{
    const monitoria = getMonitoria(h.monitoriaId);
    const disc = getDisciplina(monitoria.disciplinaId);
    const local = h.formato==='remoto' ? 'Remoto' : getLabDesc(h.labId);
    return '<div class="card" style="margin-bottom:10px"><strong>'+esc(disc.nome)+'</strong><br>'+
      '<span style="font-size:13px;color:var(--cinza-suave)">'+getNomeUser(monitoria.monitorId)+' · '+WEEKDAYS[h.diaSemana]+' '+h.horaInicio+'–'+h.horaFim+' · '+local+'</span></div>';
  }).join('') || '<p class="form-hint">Nenhum horário cadastrado.</p>';
}

function dashboardAluno(u){
  const db = getDB();
  const meusAgs = db.agendamentos.filter(a=>a.alunoId===u.id && ['confirmado','pendente'].includes(a.status));
  const avisos = db.informativos.filter(i=>i.status==='aprovado').sort((a,b)=>b.criadoEm.localeCompare(a.criadoEm)).slice(0,3);
  return (
    '<div class="card" style="margin-bottom:20px"><h2>Olá, '+esc(u.nome)+'! 👋</h2><p>Confira suas próximas monitorias e agendamentos.</p></div>'+
    '<div class="section-title"><h2>Próximas monitorias desta semana</h2></div>'+proximosHorariosGeral(3)+
    '<div class="section-title"><h2>Seus agendamentos</h2></div>'+
    (meusAgs.length ? meusAgs.map(a=>{
      const h = getHorario(a.horarioId); const monitoria = getMonitoria(h.monitoriaId); const disc = getDisciplina(monitoria.disciplinaId);
      return '<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><strong>'+esc(disc.nome)+'</strong>'+Badge(a.status)+'</div>'+
        '<p style="font-size:13px">'+fmtDateBR(a.data)+' · '+h.horaInicio+'–'+h.horaFim+'</p></div>';
    }).join('') : '<p class="form-hint">Você ainda não tem agendamentos.</p>')+
    '<div class="section-title"><h2>Avisos recentes</h2></div>'+
    (avisos.length ? avisos.map(i=>'<div class="card" style="margin-bottom:10px"><strong>'+esc(i.titulo)+'</strong><p style="font-size:13px">'+esc(i.conteudo)+'</p></div>').join('') : '<p class="form-hint">Nenhum aviso recente.</p>')
  );
}

function dashboardMonitor(u){
  const db = getDB();
  const minhasMonitorias = db.monitorias.filter(m=>m.monitorId===u.id);
  const meusHorarios = db.horarios.filter(h=> minhasMonitorias.some(m=>m.id===h.monitoriaId) && h.ativo);
  const atendimentos = db.agendamentos.filter(a=>{ const h=getHorario(a.horarioId); return h && meusHorarios.some(mh=>mh.id===h.id) && ['confirmado','pendente'].includes(a.status); }).sort((a,b)=>a.data.localeCompare(b.data)).slice(0,5);
  const pendentesInf = db.informativos.filter(i=>i.monitorId===u.id && i.status==='pendente');

  return (
    '<div class="card" style="margin-bottom:20px"><h2>Olá, '+esc(u.nome)+'!</h2><button class="btn btn-primary btn-sm" onclick="sessionStorage.setItem(\'openAddHorario\',\'1\');router.navigate(\'/meus-horarios\')"><i data-lucide="plus"></i> Adicionar Horário</button></div>'+
    '<div class="section-title"><h2>Seus próximos atendimentos</h2></div>'+
    (atendimentos.length ? atendimentos.map(a=>{
      const h=getHorario(a.horarioId); const monitoria=getMonitoria(h.monitoriaId); const disc=getDisciplina(monitoria.disciplinaId);
      return '<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><strong>'+esc(disc.nome)+'</strong>'+Badge(a.status)+'</div><p style="font-size:13px">'+fmtDateBR(a.data)+' · '+h.horaInicio+'</p></div>';
    }).join('') : '<p class="form-hint">Nenhum atendimento agendado.</p>')+
    '<div class="section-title"><h2>Seus horários desta semana</h2></div>'+
    (meusHorarios.length ? meusHorarios.map(h=>'<div class="card" style="margin-bottom:8px">'+WEEKDAYS[h.diaSemana]+' · '+h.horaInicio+'–'+h.horaFim+' · '+getNomeDisc(getMonitoria(h.monitoriaId).disciplinaId)+'</div>').join('') : '<p class="form-hint">Nenhum horário cadastrado.</p>')+
    '<div class="section-title"><h2>Informativos pendentes de aprovação</h2></div>'+
    (pendentesInf.length ? pendentesInf.map(i=>'<div class="card" style="margin-bottom:8px">'+esc(i.titulo)+' '+Badge('pendente')+'</div>').join('') : '<p class="form-hint">Nenhum informativo pendente.</p>')
  );
}

function dashboardProfessor(u){
  const db = getDB();
  const pendentes = db.informativos.filter(i=>i.professorId===u.id && i.status==='pendente');
  const minhasDisc = db.monitorias.filter(m=>m.professorId===u.id);
  return (
    '<div class="card" style="margin-bottom:20px"><h2>Olá, '+esc(u.nome)+'!</h2></div>'+
    '<div class="section-title"><h2>Aprovações pendentes <span class="badge" style="background:#FEE2E2;color:var(--vermelho-off)">'+pendentes.length+'</span></h2>'+
    '<button class="btn btn-secondary btn-sm" onclick="router.navigate(\'/aprovacoes\')">Ver todas</button></div>'+
    '<div class="section-title"><h2>Monitorias das suas disciplinas</h2></div>'+
    (minhasDisc.length ? minhasDisc.map(m=>'<div class="card" style="margin-bottom:8px">'+getNomeDisc(m.disciplinaId)+' — Monitor: '+getNomeUser(m.monitorId)+'</div>').join('') : '<p class="form-hint">Nenhuma monitoria vinculada.</p>')
  );
}

function dashboardAdmin(u){
  const db = getDB();
  const atividades = [...db.agendamentos].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,5).map(a=>{
    const h=getHorario(a.horarioId); const monitoria=getMonitoria(h.monitoriaId);
    return '<div class="card" style="margin-bottom:8px;font-size:13px">Agendamento em '+getNomeDisc(monitoria.disciplinaId)+' — '+fmtDateBR(a.data)+' '+Badge(a.status)+'</div>';
  }).join('');
  return (
    '<div class="card" style="margin-bottom:20px"><h2>Olá, '+esc(u.nome)+'!</h2></div>'+
    '<div class="grid-4">'+
      '<div class="metric-card"><div class="metric-value">'+db.monitorias.length+'</div><div class="metric-label">Monitorias Ativas</div></div>'+
      '<div class="metric-card"><div class="metric-value">'+db.disciplinas.length+'</div><div class="metric-label">Disciplinas</div></div>'+
      '<div class="metric-card"><div class="metric-value">'+db.agendamentos.length+'</div><div class="metric-label">Agendamentos Totais</div></div>'+
      '<div class="metric-card"><div class="metric-value">'+db.informativos.filter(i=>i.status==='pendente').length+'</div><div class="metric-label">Pendentes</div></div>'+
    '</div>'+
    '<div class="section-title"><h2>Últimas atividades</h2></div>'+(atividades || '<p class="form-hint">Sem atividades recentes.</p>')
  );
}

/* =====================================================================
   PÁGINA 404
===================================================================== */
function page404(){
  return '<div class="empty-state"><i data-lucide="alert-triangle"></i><p>Página não encontrada.</p><button class="btn btn-primary" onclick="router.navigate(\'/\')">Voltar ao Dashboard</button></div>';
}

/* =====================================================================
   REGISTRO DE ROTAS + AFTER RENDER DISPATCH
===================================================================== */
router.register('/', pageDashboard);
router.register('/busca', pageBusca);
router.register('/calendario', pageCalendario);
router.register('/laboratorios', pageLaboratorios);
router.register('/meus-horarios', pageMeusHorarios);
router.register('/informativo/novo', pageInformativoNovo);
router.register('/aprovacoes', pageAprovacoes);
router.register('/admin', pageAdmin);
router.register('/usuarios', pageUsuarios);
router.register('/meus-agendamentos', pageMeusAgendamentos);
router.register('/404', page404);

function afterRender(path){
  if(path==='/busca') afterRenderBusca();
  if(path==='/calendario') afterRenderCalendario();
  if(path==='/informativo/novo') afterRenderInformativoNovo();
  if(path==='/usuarios') afterRenderUsuarios();
  if(path==='/meus-horarios' && sessionStorage.getItem('openAddHorario')){
    sessionStorage.removeItem('openAddHorario');
    openHorarioModal();
  }
}

/* =====================================================================
   INICIALIZAÇÃO
===================================================================== */
function populateLoginSelects(){
  const db = getDB();
  const monitores = db.users.filter(u=>u.role==='monitor');
  const professores = db.users.filter(u=>u.role==='professor');
  $('#select-monitor').innerHTML = monitores.map(u=>'<option value="'+u.id+'">'+u.nome+'</option>').join('');
  $('#select-professor').innerHTML = professores.map(u=>'<option value="'+u.id+'">'+u.nome+'</option>').join('');
}

document.addEventListener('DOMContentLoaded', ()=>{
  seedIfNeeded();
  document.getElementById('login-logo-slot').innerHTML = MonHubLogoSVG('dark');
  populateLoginSelects();

  $('#btn-login-aluno').addEventListener('click', ()=> loginAsUserId(999));
  $('#btn-login-monitor').addEventListener('click', ()=> loginAsUserId(Number($('#select-monitor').value)));
  $('#btn-login-professor').addEventListener('click', ()=> loginAsUserId(Number($('#select-professor').value)));
  $('#btn-login-admin').addEventListener('click', ()=> loginAsUserId(6));

  const u = getCurrentUser();
  if(u){
    showApp();
    router.render(currentPath());
  } else {
    showLogin();
  }
});
</script>
